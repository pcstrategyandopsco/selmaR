# selmaR MCP Server — Default PII Field Policy
#
# Defines which fields are exposed per entity type.
# Three modes:
#   allow  — only listed fields pass through (whitelist)
#   redact — listed fields replaced with [REDACTED]
#   all    — no restrictions (for lookup tables with no PII)
#
# Field names must match the actual SELMA API output after clean_names().
# Verified against live API 2026-03-20.
#
# To override: set SELMAR_FIELD_POLICY env var to your custom YAML path,
# or place a field_policy.yml in the working directory.

students:
  mode: allow
  fields:
    - id
    - status
    - title
    - gender
    - international
    - citizenship
    - residency
    - residentialstatus
    - ethnicity1
    - ethnicity2
    - ethnicity3
    - ethnicity
    - countryofbirth
    - visatype
    - feesfree
    - prestudyactivity
    - highpostschoolqual
    - third_party_id
    - third_party_id2
    - organisation
    - interested_progid
    - interested_intakeid
  # Hidden: surname, forename, preferredname, middlename, initials,
  #         email1, email2, mobilephone, secondaryphone, dob, nsn,
  #         passportnumber, passportexpiry, visanumber, visaexpiry,
  #         medicalcondition, medicallist, medinsurance, ird_number,
  #         bank_acc, driver_licence, disability, disabilitydetails

enrolments:
  mode: allow
  fields:
    - id
    - student_id
    - intake_id
    - enrstatus
    - enrstartdate
    - enrenddate
    - enrstatusdate
    - enrreturntype
    - enrattendance
    - completedsuccessfully
    - fundingsource
    - enrcompletiondate
    - enrcompletiongrade
    - enrqualcode
    - enrwithdrawalreason
    - enrwithdrawaldate
    - enrfeesfree
    - strand_id
    - third_party_id
    - percent_attendance
    - percent_in_programme
    - percent_progress

components:
  mode: allow
  fields:
    - compenrid
    - compid
    - parentid
    - enrolid
    - studentid
    - compenrstartdate
    - compenrenddate
    - compenrduedate
    - compenrstatus
    - compenrreturntype
    - compenrsource
    - compenrefts
    - compenrfeetf
    - compenrfundingcategory
    - compenrresidency
    - compenrattendance
    - compenrgrade
    - compenrcompletioncode
    - compenrcompletiondate
    - compenrextensiondate
    - compenrwithdrawalreason
    - compenrwithdrawaldate
    - compenrfeepayingstatus
    - comp_title
    - comp_credit_fw
    - comp_level_fw
    - comp_code
    - comp_version
    - comp_type
    - milestone
    - createddate
    - updateddate
  # Hidden: compenrassessmentnote, userfieldchar*, userfielddate*,
  #         userfieldbit*, userfieldint*, userfielddecimal*,
  #         createdby, updatedby (usernames)

intakes:
  mode: allow
  fields:
    - intakeid
    - intakecode
    - intakestatus
    - progid
    - campus_id
    - intake_name
    - intakestartdate
    - intakeenddate
    - available_spaces
    - prog_ie_min_places
    - prog_ie_max_places
    - strand_id
    - funding_source
    - fees
    - createddate
    - updateddate
  # Hidden: createdby, updatedby (usernames)

programmes:
  mode: allow
  fields:
    - progid
    - progcode
    - progversion
    - progtitle
    - progdescription
    - progcrediteq
    - progleveleq
    - progefts
    - progstatus
    - proglength
    - proglengthunits
    - ygtype
    - nzqacode
    - progress_type
    - createddate
    - updateddate
  # Hidden: createdby, updatedby (usernames)

contacts:
  mode: allow
  fields:
    - id
    - type_2
    - gender
    - status
    - createddate
  # Hidden: surname, forename, preferredname, middlename, initials,
  #         email1, mobilephone, secondaryphone, workphone, dob, otherid

addresses:
  mode: allow
  fields:
    - addressid
    - addresstype
    - city
    - postcode
    - region
    - country
    - validfrom
    - validto
    - studentid
    - orgid
    - contactid
    - createddate
    - updateddate
  # Hidden: street, suburb (too specific for PII)

notes:
  mode: allow
  fields:
    - noteid
    - student_id
    - enrolmentid
    - notetype
    - notearea
    - confidential
    - createddate
  # Hidden: note1 (free text may contain PII), createdby (username)

organisations:
  mode: allow
  fields:
    - id
    - name
    - legalname
    - orgtype
    - country
    - registration_number
  # Note: currently returns 0 rows in production

classes:
  mode: allow
  fields:
    - id
    - class_name
    - capacity
    - enrolment_count
    - startdate
    - enddate
    - campusid
    - active
    - createddate
  # Hidden: description (may contain PII), otherid, createdby

# Lookup entities -- no PII
campuses:
  mode: all
ethnicities:
  mode: all
countries:
  mode: all
genders:
  mode: all
titles:
  mode: all
