    - created_at
  # Hidden: note1/body (free text may contain PII), createdby/created_by (username)

# v3 only — events link comments/tasks/emails to students/enrolments
events:
  mode: allow
  fields:
    - id
    - student
    - enrolment
    - intake
    - event_type
    - event_subject
    - event_priority
    - event_complete
    - event_due_date
    - created_at
    - updated_at
  # Hidden: event_body (may contain PII — free text email/note content)

# v3 only — replaces v2 enrolment_component_attempts
component_grades:
  mode: allow
  fields:
