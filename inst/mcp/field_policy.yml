# selmaR MCP Server — Default PII Field Policy
#
# Defines which fields are exposed per entity type.
# Three modes:
#   allow  — only listed fields pass through (whitelist)
#   redact — listed fields replaced with [REDACTED]
#   all    — no restrictions (for lookup tables with no PII)
#
# Field names must match the actual SELMA API output after clean_names().
# Both v2 and v3 names are listed; apply_field_policy() uses intersect() so
# only columns that exist in the data pass through — extra names are harmless.
# Verified against live API 2026-03-20; v3 names added 2026-04-25.
#
# To override: set SELMAR_FIELD_POLICY env var to your custom YAML path,
# or place a field_policy.yml in the working directory.

students:
  mode: allow
  fields:
    - id
    # v2 fields
    - status
    - title
    - gender
    - international
    - citizenship
    - residency
    - residentialstatus
    - ethnicity1
    - ethnicity2
    - ethnicity3
    - ethnicity
    - countryofbirth
    - visatype
    - feesfree
    - prestudyactivity
    - highpostschoolqual
    - third_party_id
    - third_party_id2
    - organisation
    - interested_progid
    - interested_intakeid
    # v3 equivalents / new fields
    - student_status
    - pronoun
    - country_of_birth
    - fees_free
    - other_id_1
    - other_id_2
    - student_identifier
    - homestay
    - primary_learning_style
    - secondary_learning_style
    - contact_id
    - new_zealand_student_extension
    - australia_student_extension
  # Hidden (both versions): surname/first_name, forename/last_name, preferredname/preferred_name,
  #   middlename/middle_name, email1/email_primary, email2/email_secondary,
  #   mobilephone/phone_mobile, secondaryphone/phone_home, phone_work,
  #   dob/date_of_birth, nsn/national_student_number,
  #   passportnumber, passportexpiry, visanumber, visaexpiry,
  #   medicalcondition/medical_condition, bank_acc/bank_account,
  #   disability, disabilitydetails/disability_details, user_name, email_school

